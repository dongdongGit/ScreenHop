name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc, aarch64-pc-windows-msvc]
        include:
          - target: x86_64-pc-windows-msvc
            arch: win-x64
          - target: i686-pc-windows-msvc
            arch: win-x86
          - target: aarch64-pc-windows-msvc
            arch: win-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $version = $env:GITHUB_REF -replace "refs/tags/", ""
          } else {
            $version = "latest"
          }
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $ver = "${{ steps.get_version.outputs.version }}"
          $src = "target/${{ matrix.target }}/release/screenhop.exe"
          $dest = "ScreenHop-${{ matrix.arch }}-$ver.zip"
          Compress-Archive -Path $src -DestinationPath $dest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: ScreenHop-*.zip

  # 并行编译 macOS arm64 和 x86_64
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
        include:
          - target: aarch64-apple-darwin
            arch: macOS-arm64
          - target: x86_64-apple-darwin
            arch: macOS-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build .app bundle
        working-directory: crates/app
        run: cargo bundle --release --target ${{ matrix.target }}

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - \
            target/${{ matrix.target }}/release/bundle/osx/ScreenHop.app

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          cd target/${{ matrix.target }}/release/bundle/osx
          zip -r "$GITHUB_WORKSPACE/ScreenHop-${{ matrix.arch }}-$VERSION.zip" ScreenHop.app

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: ScreenHop-*.zip

      # 上传 .app 目录供 universal job 使用（用 tar 保留符号链接和权限）
      - name: Upload .app for universal build
        run: |
          tar czf /tmp/ScreenHop-${{ matrix.arch }}.app.tar.gz \
            -C target/${{ matrix.target }}/release/bundle/osx ScreenHop.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-app
          path: /tmp/ScreenHop-${{ matrix.arch }}.app.tar.gz

  # 从已编译产物创建 macOS Universal .app（不重复编译）
  build-macos-universal:
    runs-on: macos-latest
    needs: [build-macos]

    steps:
      - name: Download arm64 .app
        uses: actions/download-artifact@v4
        with:
          name: macos-macOS-arm64-app
          path: /tmp/artifacts

      - name: Download x86_64 .app
        uses: actions/download-artifact@v4
        with:
          name: macos-macOS-x86_64-app
          path: /tmp/artifacts

      - name: Extract .app bundles
        run: |
          mkdir -p arm64 x86_64
          tar xzf /tmp/artifacts/ScreenHop-macOS-arm64.app.tar.gz -C arm64
          tar xzf /tmp/artifacts/ScreenHop-macOS-x86_64.app.tar.gz -C x86_64

      - name: Create Universal .app with lipo
        run: |
          # 复制 arm64 .app 作为基础
          cp -R arm64/ScreenHop.app ScreenHop-universal.app
          # 用 lipo 替换内部二进制为 Universal
          lipo -create \
            arm64/ScreenHop.app/Contents/MacOS/screenhop \
            x86_64/ScreenHop.app/Contents/MacOS/screenhop \
            -output ScreenHop-universal.app/Contents/MacOS/screenhop
          # Ad-hoc 签名
          codesign --force --deep --sign - ScreenHop-universal.app

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          zip -r "ScreenHop-macOS-universal-$VERSION.zip" ScreenHop-universal.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-macOS-universal
          path: ScreenHop-macOS-universal-*.zip

  # 发布 Release
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-macos-universal]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Window Mover ${{ steps.get_version.outputs.version }}

            ### 📥 下载选择 (Download Options)

            #### Windows
            - 💻 **64位 (通用)**: `ScreenHop-win-x64-....zip`
            - 🖥️ **32位**: `ScreenHop-win-x86-....zip`
            - 📱 **ARM64**: `ScreenHop-win-arm64-....zip`

            #### macOS
            - 🌐 **通用版 (Universal)**: `ScreenHop-macOS-universal-....zip` ✅ 推荐
            - 🍎 **Apple Silicon**: `ScreenHop-macOS-arm64-....zip`
            - 🖥️ **Intel**: `ScreenHop-macOS-x86_64-....zip`

            ### 使用方法
            **Windows**: 解压后运行 `screenhop.exe`
            **macOS**: 解压后运行 `screenhop`，首次需在 **系统设置 → 隐私与安全性 → 辅助功能** 中授权

            ---
            *Rust cross-platform build*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}